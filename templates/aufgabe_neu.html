{% extends "base.html" %}
{% block title %}Neue Aufgabe{% endblock %}
{% block content %}
<p><a href="/ui/aufgaben">← Aufgabenpool</a></p>
<h2>Neue Aufgabe</h2>

<div style="display:flex; gap:1.5rem; align-items:flex-start;">
  <form method="post" action="/ui/aufgaben" enctype="multipart/form-data" style="flex:1; min-width:0;">
    <label>Titel <input type="text" name="titel" required></label>
    <label>Aufgabenstellung <textarea name="aufgabenstellung" rows="5" required></textarea></label>
    <label>Bild zur Aufgabenstellung (optional)
      <input type="file" name="bild_aufgabe" accept="image/*">
    </label>
    <label>Lösung (optional) <textarea name="loesung" rows="4"></textarea></label>
    <label>Bild zur Lösung (optional)
      <input type="file" name="bild_loesung" accept="image/*">
    </label>
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:.5rem;">
      <label>Max. Punkte <input type="number" name="max_punkte" step="0.5" min="0.5" required></label>
      <label>AFB-Niveau
        <select name="afb_niveau">
          <option value="AFB_I">Reproduzieren</option>
          <option value="AFB_II" selected>Anwenden</option>
          <option value="AFB_III">Verallgemeinern</option>
        </select>
      </label>
    </div>
    <label>Tags (kommagetrennt)
      <input type="text" name="tags" placeholder="optional, z.B. Übung, Hausaufgabe">
    </label>

    <label style="margin-top:.5rem;">Diese Aufgabe entspricht direkt folgendem Grundwissen (optional)
      <select name="grundwissen_id">
        <option value="">– keine –</option>
        {% for gw in grundwissen_liste %}
        <option value="{{ gw.id }}">
          Kl.{{ gw.jahrgangsstufe }} · {{ gw.kapitel }}{% if gw.unterkapitel %} › {{ gw.unterkapitel }}{% endif %} — {{ gw.aufgabe | truncate(60) }}
        </option>
        {% endfor %}
      </select>
    </label>

    <fieldset style="margin-top:1rem;">
      <legend>Buchkapitel-Zuordnung</legend>
      <small class="hint">Hilft später bei der Aufgaben-Empfehlung nach Schulaufgaben.</small>
      <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:.5rem; margin-top:.5rem;">
        <label>Kapitel
          <select name="kapitel" id="kapitel-select-neu"
                  hx-get="/ui/aufgaben/meta/unterkapitel"
                  hx-target="#uk-select-neu"
                  hx-swap="innerHTML"
                  hx-trigger="change"
                  hx-include="this">
            <option value="">– keine –</option>
            {% for k in kapitel_liste %}
            <option value="{{ k }}">{{ k }}</option>
            {% endfor %}
          </select>
        </label>
        <label>Unterkapitel
          <select name="unterkapitel" id="uk-select-neu">
            <option value="">– keine –</option>
          </select>
        </label>
        <label>Jahrgangsstufe
          <input type="number" name="jahrgangsstufe" id="js-input-neu"
                 min="5" max="13" placeholder="5–13">
        </label>
      </div>
    </fieldset>
    <script>
    document.getElementById('kapitel-select-neu').addEventListener('change', function() {
      var k = encodeURIComponent(this.value);
      if (!k) return;
      fetch('/ui/aufgaben/meta/jahrgangsstufe?kapitel=' + k)
        .then(function(r) { return r.text(); })
        .then(function(t) { if (t.trim()) document.getElementById('js-input-neu').value = t.trim(); });
    });
    </script>

    <button type="submit" style="margin-top:1rem;">Anlegen</button>
  </form>

  {% include "latex_spicker.html" %}
</div>
{% endblock %}
