{% extends "base.html" %}
{% block title %}Neue Aufgabe{% endblock %}
{% block content %}
<p><a href="/ui/aufgaben">← Aufgabenpool</a></p>
<h2>Neue Aufgabe</h2>

<div style="display:flex; gap:1.5rem; align-items:flex-start;">
  <form method="post" action="/ui/aufgaben" style="flex:1; min-width:0;">
    <label>Titel <input type="text" name="titel" required></label>
    <label>Aufgabenstellung <textarea name="aufgabenstellung" rows="5" required></textarea></label>
    <label>Lösung (optional) <textarea name="loesung" rows="4"></textarea></label>
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:.5rem;">
      <label>Max. Punkte <input type="number" name="max_punkte" step="0.5" min="0.5" required></label>
      <label>AFB-Niveau
        <select name="afb_niveau">
          <option value="AFB_I">AFB I</option>
          <option value="AFB_II" selected>AFB II</option>
          <option value="AFB_III">AFB III</option>
        </select>
      </label>
    </div>
    <label>Tags (kommagetrennt)
      <input type="text" name="tags" placeholder="optional">
    </label>

    <fieldset style="margin-top:1rem;">
      <legend>Buchkapitel-Zuordnung</legend>
      <small class="hint">Hilft später bei der Aufgaben-Empfehlung nach Schulaufgaben.</small>
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:.5rem; margin-top:.5rem;">
        <label>Kapitel
          <select name="kapitel"
                  hx-get="/ui/aufgaben/meta/unterkapitel"
                  hx-target="#uk-select-neu"
                  hx-swap="innerHTML"
                  hx-trigger="change"
                  hx-include="this">
            <option value="">– keine –</option>
            {% for k in kapitel_liste %}
            <option value="{{ k }}">{{ k }}</option>
            {% endfor %}
          </select>
        </label>
        <label>Unterkapitel
          <select name="unterkapitel" id="uk-select-neu">
            <option value="">– keine –</option>
          </select>
        </label>
      </div>
    </fieldset>

    <button type="submit" style="margin-top:1rem;">Anlegen</button>
  </form>

  {% include "latex_spicker.html" %}
</div>
{% endblock %}
