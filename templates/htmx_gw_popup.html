<dialog id="gw-popup" style="border-radius:.6rem; padding:0; border:none; box-shadow:0 8px 32px rgba(0,0,0,.18); max-width:480px; width:90%; top:50%; transform:translateY(-50%);">
  <article style="margin:0; padding:1.25rem 1.5rem;">
    <header style="margin:-1.25rem -1.5rem 1rem; padding:.75rem 1.5rem; border-bottom:1px solid #dee2e6; background:#f8f9fa; border-radius:.6rem .6rem 0 0;">
      <strong>🧠 Grundwissen-Fehler</strong>
      <span style="font-size:.85rem; color:#6c757d; margin-left:.75rem;">
        Aufg.&nbsp;{{ la.aufgabennummer }} – {{ la.aufgabe.titel | truncate(35) }}
      </span>
      <br>
      <small style="color:#6c757d;">{{ schueler_name }}</small>
    </header>

    <p style="font-size:.85rem; color:#555; margin:0 0 .75rem;">
      Welches Grundwissen hat bei dieser Aufgabe gefehlt?
    </p>

    {% for gw in gw_items %}
    <label style="display:flex; align-items:flex-start; gap:.5rem; margin-bottom:.6rem; cursor:pointer; padding:.4rem .5rem; border-radius:.35rem; transition:background .1s;"
           onmouseover="this.style.background='#f0f4ff'" onmouseout="this.style.background=''">
      <input type="checkbox"
             style="margin-top:.15rem; flex-shrink:0; accent-color:#c1121f; width:1rem; height:1rem;"
             {% if gw.id in fehler_ids %}checked{% endif %}
             onchange="postGwFehler({{ lid }}, {{ schueler_id }}, {{ la.id }}, {{ gw.id }}, this.checked)">
      <span>
        <span style="font-size:.9rem; display:block; line-height:1.3;">{{ gw.aufgabe }}</span>
        <small style="color:#6c757d;">{{ gw.kapitel }}{% if gw.unterkapitel %} › {{ gw.unterkapitel }}{% endif %} · Kl.{{ gw.jahrgangsstufe }}</small>
      </span>
    </label>
    {% endfor %}

    <footer style="margin:1rem -1.5rem -.75rem; padding:.75rem 1.5rem; border-top:1px solid #dee2e6; text-align:right;">
      <button onclick="document.getElementById('gw-popup').close(); return false;"
              style="margin:0;">Fertig</button>
    </footer>
  </article>
</dialog>
<script>
(function() {
  var d = document.getElementById('gw-popup');
  if (d) { try { d.close(); } catch(e){} d.showModal(); }
})();
</script>
