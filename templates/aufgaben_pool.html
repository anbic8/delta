{% extends "base.html" %}
{% block title %}Aufgabenpool{% endblock %}
{% block content %}
<div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1rem;">
  <h2>Aufgabenpool</h2>
  <a href="/ui/aufgaben/neu" role="button">+ Neue Aufgabe</a>
</div>

<div style="display:flex; gap:1rem; margin-bottom:1rem; align-items:center;">
  <input type="search"
         placeholder="Suche (Titel, Aufgabenstellung, Tags)…"
         hx-get="/ui/aufgaben/suche"
         hx-target="#aufgaben-liste"
         hx-trigger="input changed delay:300ms"
         hx-include="[name='afb']"
         name="q"
         style="flex:1;">
  <select name="afb"
          hx-get="/ui/aufgaben/suche"
          hx-target="#aufgaben-liste"
          hx-trigger="change"
          hx-include="[name='q']"
          style="width:auto;">
    <option value="">Alle AFB</option>
    <option value="AFB_I">AFB I</option>
    <option value="AFB_II">AFB II</option>
    <option value="AFB_III">AFB III</option>
  </select>
</div>

<div id="aufgaben-liste">
  {% include "htmx_aufgaben.html" %}
</div>
{% endblock %}
